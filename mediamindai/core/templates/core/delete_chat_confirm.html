{% extends 'core/base.html' %}
{% block content %}

<style>
/* ===============================
   DELETE CHAT CONFIRMATION
=============================== */

._delete-wrapper {
    min-height: calc(100vh - 100px);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 40px;
}

/* ===============================
   GLASS CARD
=============================== */

._delete-card {
    width: 100%;
    max-width: 520px;
    padding: 34px;
    border-radius: 16px;

    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);

    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.45);
    border: 1px solid rgba(255, 255, 255, 0.2);

    color: #ffffff;
    text-align: center;
}

/* ===============================
   ICON / HEADING
=============================== */

._delete-icon {
    font-size: 40px;
    margin-bottom: 14px;
}

._delete-heading {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 10px;
}

/* ===============================
   TEXT
=============================== */

._delete-text {
    font-size: 15px;
    opacity: 0.85;
    margin-bottom: 26px;
    line-height: 1.5;
}

/* ===============================
   BUTTONS
=============================== */

._delete-actions {
    display: flex;
    justify-content: center;
    gap: 14px;
}

._delete-btn {
    padding: 11px 22px;
    border-radius: 22px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    border: none;
    cursor: pointer;
}

/* Cancel */
._delete-cancel {
    background: rgba(255, 255, 255, 0.18);
    color: #ffffff;
}

._delete-cancel:hover {
    background: rgba(255, 255, 255, 0.28);
}

/* Delete */
._delete-confirm {
    background: linear-gradient(135deg, #ff4d4d, #b30000);
    color: #ffffff;
}

._delete-confirm:hover {
    box-shadow: 0 8px 24px rgba(255, 77, 77, 0.55);
}
</style>

<div class="_delete-wrapper">
    <div class="_delete-card">

        <div class="_delete-icon">⚠️</div>

        <div class="_delete-heading">
            Delete Chat?
        </div>

        <div class="_delete-text">
            Are you sure you want to delete
            <strong>"{{ chat.title }}"</strong>?
            <br>
            This action cannot be undone.
        </div>

        <div class="_delete-actions">
            <a href="{% url 'home' %}" class="_delete-btn _delete-cancel">
                Cancel
            </a>

            <form method="post">
                {% csrf_token %}
                <button type="submit" class="_delete-btn _delete-confirm">
                    Delete
                </button>
            </form>
        </div>

    </div>
</div>

{% endblock %}
